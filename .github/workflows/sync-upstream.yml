name: Sync with upstream

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小時同步一次
  workflow_dispatch:  # 手動觸發

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "testarossa-agent"
          git config user.email "jiayun+testarossa@gmail.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/thepagent/claw-info.git
          git fetch upstream

      - name: Sync with upstream (hard reset)
        run: |
          git checkout main
          # 備份 sync workflow（會被 reset 刪除）
          cp .github/workflows/sync-upstream.yml /tmp/sync-upstream.yml
          git reset --hard upstream/main
          # 恢復 sync workflow
          mkdir -p .github/workflows
          cp /tmp/sync-upstream.yml .github/workflows/sync-upstream.yml
          git add .github/workflows/sync-upstream.yml
          git diff --staged --quiet || git commit -m "chore: sync with upstream"
          git push origin main --force