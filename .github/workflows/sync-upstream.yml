name: Sync with upstream

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小時同步一次
  workflow_dispatch:  # 手動觸發

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "testarossa-agent"
          git config user.email "jiayun+testarossa@gmail.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/thepagent/claw-info.git
          git fetch upstream

      - name: Sync main with upstream
        run: |
          # 明確指定從 origin/main checkout
          git checkout -B main origin/main
          # 嘗試 fast-forward
          if ! git merge --ff-only upstream/main 2>/dev/null; then
            # 無法 fast-forward，直接 reset 到 upstream/main
            git reset --hard upstream/main
          fi
          git push origin main